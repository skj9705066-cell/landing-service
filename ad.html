<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=1000"/>
<title>PageCraft 당근 광고</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Noto Sans KR',sans-serif;
  background:#f0f0f0;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  padding:40px;
}

.ad{
  width:1000px;
  height:1000px;
  background:#FEE500;
  border-radius:0;
  flex-shrink:0;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  padding:72px 80px 64px;
  position:relative;
  overflow:hidden;
}

/* 배경 장식 */
.ad::before{
  content:'PC';
  position:absolute;
  right:-60px;
  bottom:-40px;
  font-size:420px;
  font-weight:900;
  color:rgba(26,26,46,.06);
  letter-spacing:-.06em;
  line-height:1;
  user-select:none;
  pointer-events:none;
}

/* 상단 영역 */
.ad-top{display:flex;flex-direction:column;gap:0}

.badge{
  display:inline-flex;
  align-items:center;
  background:#1A1A2E;
  color:#FEE500;
  font-size:18px;
  font-weight:700;
  padding:10px 20px;
  border-radius:8px;
  letter-spacing:-.01em;
  width:fit-content;
  margin-bottom:48px;
}

.main-texts{display:flex;flex-direction:column;gap:4px;margin-bottom:40px}
.main-text{
  font-size:96px;
  font-weight:900;
  color:#1A1A2E;
  letter-spacing:-.04em;
  line-height:1.05;
}

.divider{
  width:100%;
  height:1px;
  background:rgba(0,0,0,.1);
  margin-bottom:32px;
}

.sub-texts{display:flex;flex-direction:column;gap:10px;margin-bottom:32px}
.sub-text{
  font-size:22px;
  color:rgba(26,26,46,.5);
  font-weight:500;
  letter-spacing:-.02em;
  line-height:1.5;
}

.tag{
  display:inline-flex;
  align-items:center;
  background:rgba(26,26,46,.1);
  color:rgba(26,26,46,.6);
  font-size:18px;
  font-weight:500;
  padding:8px 18px;
  border-radius:100px;
  letter-spacing:-.01em;
  width:fit-content;
}

/* 하단 영역 */
.ad-bottom{
  display:flex;
  align-items:center;
  justify-content:space-between;
}

.brand{
  font-size:15px;
  font-weight:500;
  color:rgba(26,26,46,.35);
  letter-spacing:.18em;
  text-transform:uppercase;
}

.cta-btn{
  display:inline-flex;
  align-items:center;
  gap:4px;
  background:#1A1A2E;
  color:#FEE500;
  font-family:'Noto Sans KR',sans-serif;
  font-size:20px;
  font-weight:700;
  padding:14px 28px;
  border-radius:100px;
  letter-spacing:-.02em;
  border:none;
  cursor:pointer;
}
</style>
</head>
<body>
<div class="ad">

  <div class="ad-top">
    <span class="badge">랜딩페이지 제작</span>

    <div class="main-texts">
      <span class="main-text">제작 후 결제</span>
      <span class="main-text">1일 완성</span>
    </div>

    <div class="divider"></div>

    <div class="sub-texts">
      <span class="sub-text">레퍼런스 URL 하나면 충분합니다</span>
      <span class="sub-text">불만족 시 100% 무료</span>
    </div>

    <span class="tag">다른 곳은 2주 · 저는 하루</span>
  </div>

  <div class="ad-bottom">
    <span class="brand">Page Craft</span>
    <button class="cta-btn">지금 상담받기 →</button>
  </div>

</div>
</body>
</html>
